services:
  postgres:
    image: postgres:17-alpine
    container_name: cadence_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
      POSTGRES_DB: cadence_db
    volumes:
      - cadence_pgdata:/var/lib/postgresql/data

volumes:
  cadence_pgdata:
